<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兒童發展基金查詢系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap');
:root{
  --primary:#e07b00;
  --primary-dark:#c06a00;
  --primary-light:#fff3e0;
  --accent:#f5a623;
  --grey:#555;
  --grey-light:#888;
  --border:#ddd;
  --bg:#f7f7f7;
  --card:#fff;
  --text:#333;
  --muted:#888;
  --success:#2e7d3e;
  --danger:#c0392b;
  --warn:#d4820a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* ── LANDING ── */
#landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#fff 0%,#f7f7f7 40%,#ffe8c0 100%);
  position:relative;overflow:hidden;}
#landing::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% 20%, rgba(224,123,0,.08) 0%, transparent 60%),
             radial-gradient(ellipse at 20% 80%, rgba(245,166,35,.06) 0%, transparent 55%);}
.landing-inner{text-align:center;z-index:1;padding:2rem;animation:fadeUp .8s ease both;}
.logo-wrap{margin:0 auto 1.6rem;width:280px;max-width:80vw;}
.logo-wrap img{width:100%;height:auto;display:block;}
.land-title{font-family:'Noto Serif TC',serif;font-size:clamp(1.4rem,3.5vw,2rem);color:var(--grey);font-weight:700;margin-bottom:.5rem;}
.land-divider{width:60px;height:3px;background:var(--primary);border-radius:2px;margin:.8rem auto 1.8rem;}
.land-sub{color:var(--grey-light);font-size:.92rem;margin-bottom:2.8rem;letter-spacing:.04em;}
.role-cards{display:flex;gap:1.2rem;flex-wrap:wrap;justify-content:center;}
.role-card{background:#fff;border:2px solid var(--border);border-radius:18px;padding:1.8rem 2.2rem;
  cursor:pointer;transition:all .28s;min-width:190px;text-align:center;
  box-shadow:0 2px 12px rgba(0,0,0,.06);}
.role-card:hover{border-color:var(--primary);transform:translateY(-5px);box-shadow:0 12px 32px rgba(224,123,0,.15);}
.role-card .rc-icon{font-size:2.2rem;margin-bottom:.8rem;}
.role-card .rc-label{color:var(--text);font-size:1rem;font-weight:600;margin-bottom:.25rem;}
.role-card .rc-count{color:var(--muted);font-size:.8rem;}
.role-card.rc-active{border-color:var(--primary);background:var(--primary-light);}
.role-card.rc-admin{border-color:#bbb;}
.role-card.rc-admin:hover{border-color:#555;box-shadow:0 12px 32px rgba(0,0,0,.12);}

/* ── AUTH ── */
#auth-page{display:none;min-height:100vh;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#fff 0%,#f7f7f7 40%,#ffe8c0 100%);}
.auth-wrap{width:100%;max-width:440px;padding:1rem;}
.auth-back{display:inline-flex;align-items:center;gap:.4rem;color:var(--muted);font-size:.88rem;cursor:pointer;margin-bottom:1.4rem;transition:color .2s;}
.auth-back:hover{color:var(--primary);}
.auth-card{background:var(--card);border-radius:20px;padding:2.2rem 2.4rem;box-shadow:0 4px 32px rgba(0,0,0,.09);border:1px solid var(--border);}
.auth-logo{width:160px;margin:0 auto 1.2rem;display:block;}
.auth-head{text-align:center;margin-bottom:1.6rem;}
.auth-badge{display:inline-flex;align-items:center;gap:.45rem;padding:.35rem .9rem;border-radius:100px;font-size:.8rem;font-weight:600;margin-bottom:.8rem;background:var(--primary-light);color:var(--primary-dark);}
.auth-badge.ab-mentor{background:#e8f5ee;color:#2e7d3e;}
.auth-badge.ab-admin{background:#f0f0f0;color:#555;}
.auth-title{font-family:'Noto Serif TC',serif;font-size:1.45rem;font-weight:700;margin-bottom:.25rem;color:var(--text);}
.auth-desc{color:var(--muted);font-size:.85rem;}
.tab-row{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:1.4rem;}
.tab-btn{flex:1;padding:.52rem;border:none;background:transparent;border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-size:.86rem;font-weight:500;cursor:pointer;color:var(--muted);transition:all .22s;}
.tab-btn.active{background:var(--card);color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.09);font-weight:600;}
.fg{margin-bottom:1rem;}
.fl{display:block;font-size:.82rem;font-weight:600;margin-bottom:.35rem;color:var(--grey);}
.fl small{font-weight:400;color:var(--muted);}
.fi{width:100%;padding:.68rem .95rem;border:1.5px solid var(--border);border-radius:10px;font-family:'Noto Sans TC',sans-serif;font-size:.92rem;color:var(--text);background:#fafafa;transition:border-color .2s,box-shadow .2s;outline:none;}
.fi:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(224,123,0,.12);background:#fff;}
.btn-main{width:100%;padding:.78rem;border:none;border-radius:10px;font-family:'Noto Sans TC',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:.35rem;
  background:var(--primary);color:#fff;}
.btn-main:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 14px rgba(224,123,0,.3);}
.btn-main.btn-mentor{background:#2e7d3e;}
.btn-main.btn-mentor:hover{background:#246331;box-shadow:0 4px 14px rgba(46,125,62,.3);}
.btn-main.btn-admin{background:#555;}
.btn-main.btn-admin:hover{background:#333;}
.auth-note{text-align:center;font-size:.78rem;color:var(--muted);margin-top:.8rem;line-height:1.6;}
.err-box{background:#fdf0ee;border:1px solid #f5c6c0;color:var(--danger);border-radius:9px;padding:.6rem .9rem;font-size:.83rem;margin-bottom:.9rem;display:none;}

/* ── TOPBAR ── */
#dashboard{display:none;min-height:100vh;background:var(--bg);}
.topbar{background:#fff;border-bottom:2px solid var(--primary);padding:0 1.5rem;height:62px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.06);}
.tb-left{display:flex;align-items:center;gap:.9rem;}
.tb-logo{height:36px;width:auto;display:block;}
.tb-title{font-family:'Noto Serif TC',serif;font-size:.95rem;font-weight:700;color:var(--grey);
  border-left:2px solid var(--border);padding-left:.9rem;margin-left:.1rem;}
.tb-right{display:flex;align-items:center;gap:.9rem;}
.user-chip{padding:.26rem .8rem;border-radius:100px;font-size:.82rem;font-weight:600;border:1.5px solid var(--border);}
.uc-family{background:var(--primary-light);color:var(--primary-dark);border-color:rgba(224,123,0,.25);}
.uc-mentor{background:#e8f5ee;color:#2e7d3e;border-color:rgba(46,125,62,.25);}
.uc-admin{background:#f0f0f0;color:#444;border-color:#ccc;}
.logout-btn{padding:.28rem .8rem;border:1.5px solid var(--border);border-radius:100px;background:transparent;
  font-family:'Noto Sans TC',sans-serif;font-size:.78rem;cursor:pointer;color:var(--muted);transition:all .2s;}
.logout-btn:hover{border-color:var(--danger);color:var(--danger);}

/* ── MAIN ── */
.main{max-width:980px;margin:0 auto;padding:1.8rem 1.5rem;}

/* ── BANNER ── */
.banner{border-radius:16px;padding:1.6rem 2rem;color:#fff;margin-bottom:1.6rem;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.banner-family{background:linear-gradient(135deg,var(--primary),#f5a623);}
.banner-mentor{background:linear-gradient(135deg,#2e7d3e,#52a865);}
.banner-admin{background:linear-gradient(135deg,#444,#777);}
.ban-text h2{font-family:'Noto Serif TC',serif;font-size:1.3rem;margin-bottom:.25rem;}
.ban-text p{color:rgba(255,255,255,.75);font-size:.86rem;}
.ban-stats{display:flex;gap:1.4rem;}
.stat-box{text-align:center;}
.stat-num{font-size:1.7rem;font-weight:700;font-family:'Noto Serif TC',serif;color:#fff;}
.stat-lbl{font-size:.7rem;color:rgba(255,255,255,.65);}

/* ── SECTIONS ── */
.sec-title{font-family:'Noto Serif TC',serif;font-size:1.08rem;font-weight:700;color:var(--grey);
  margin-bottom:.85rem;display:flex;align-items:center;gap:.45rem;
  padding-bottom:.5rem;border-bottom:2px solid var(--primary);}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:1.4rem;margin-bottom:1.4rem;
  box-shadow:0 1px 6px rgba(0,0,0,.04);}

/* ── PROGRESS ── */
.prog-row{display:flex;align-items:center;gap:.9rem;margin-bottom:.7rem;}
.prog-label{font-size:.83rem;min-width:140px;font-weight:500;color:var(--grey);}
.prog-wrap{background:#eee;border-radius:100px;height:8px;overflow:hidden;flex:1;}
.prog-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .8s ease;}
.prog-bar.mentor-bar{background:linear-gradient(90deg,#2e7d3e,#52a865);}
.prog-pct{font-size:.83rem;width:36px;text-align:right;font-weight:700;color:var(--primary);}

/* ── ACT TABLE ── */
.act-label{font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
  margin:1.2rem 0 .55rem;padding-bottom:.4rem;border-bottom:1.5px solid var(--border);}
.act-label:first-child{margin-top:0;}
.act-table{width:100%;border-collapse:collapse;font-size:.87rem;}
.act-table th{text-align:left;padding:.52rem .75rem;font-weight:600;color:var(--muted);font-size:.74rem;
  text-transform:uppercase;letter-spacing:.05em;border-bottom:1.5px solid var(--border);background:#fafafa;}
.act-table td{padding:.78rem .75rem;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
.act-table tr:last-child td{border-bottom:none;}
.act-table tr:hover td{background:#fdf9f5;}
.badge{display:inline-flex;align-items:center;gap:.22rem;padding:.2rem .65rem;border-radius:100px;font-size:.75rem;font-weight:600;}
.b-done{background:#e8f5ee;color:var(--success);}
.b-not{background:#fdf0ee;color:var(--danger);}

/* ── MENTOR FAMILY CARDS ── */
.fam-card{border:1px solid var(--border);border-radius:11px;padding:.85rem 1.1rem;margin-bottom:.65rem;transition:all .2s;}
.fam-card:hover{box-shadow:0 3px 14px rgba(224,123,0,.1);border-color:rgba(224,123,0,.3);}
.fam-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.32rem;}
.fam-code{font-weight:700;color:var(--primary);font-size:.9rem;}
.mini-prog{display:flex;align-items:center;gap:.5rem;}
.mini-wrap{background:#eee;border-radius:100px;height:6px;width:72px;overflow:hidden;}
.mini-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--primary),var(--accent));}
.mini-pct{font-size:.79rem;font-weight:700;color:var(--primary);}
.fam-detail{font-size:.8rem;color:var(--muted);}

/* ── ADMIN ── */
.adm-tabs{display:flex;gap:.45rem;margin-bottom:1.1rem;flex-wrap:wrap;}
.adm-tab{padding:.46rem 1rem;border:1.5px solid var(--border);border-radius:100px;background:transparent;
  font-family:'Noto Sans TC',sans-serif;font-size:.83rem;font-weight:500;cursor:pointer;color:var(--muted);transition:all .2s;}
.adm-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.adm-tab:hover:not(.active){border-color:var(--primary);color:var(--primary);}
.adm-search{width:100%;padding:.62rem .95rem;border:1.5px solid var(--border);border-radius:10px;
  font-family:'Noto Sans TC',sans-serif;font-size:.88rem;background:#fafafa;outline:none;
  margin-bottom:.9rem;transition:border-color .2s,box-shadow .2s;max-width:260px;}
.adm-search:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(224,123,0,.1);background:#fff;}
.adm-table{width:100%;border-collapse:collapse;font-size:.85rem;}
.adm-table th{text-align:left;padding:.52rem .75rem;font-weight:600;color:var(--muted);font-size:.74rem;
  text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--border);background:#fafafa;}
.adm-table td{padding:.72rem .75rem;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
.adm-table tr:last-child td{border-bottom:none;}
.adm-table tr:hover td{background:#fdf9f5;}
.adm-code{font-weight:700;color:var(--primary);}
.adm-pct{font-weight:700;}
.pct-high{color:var(--success);}
.pct-mid{color:var(--warn);}
.pct-low{color:var(--danger);}
.adm-mini-wrap{background:#eee;border-radius:100px;height:6px;width:58px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:.35rem;}
.adm-mini-bar{height:100%;border-radius:100px;}
.bar-high{background:var(--success);}
.bar-mid{background:var(--warn);}
.bar-low{background:var(--danger);}
.adm-export{padding:.46rem 1rem;border:1.5px solid var(--border);border-radius:9px;background:transparent;
  font-family:'Noto Sans TC',sans-serif;font-size:.8rem;cursor:pointer;color:var(--grey);transition:all .2s;float:right;}
.adm-export:hover{border-color:var(--primary);color:var(--primary);}
.adm-summary{display:flex;gap:.9rem;flex-wrap:wrap;margin-bottom:1.1rem;}
.adm-sum-box{flex:1;min-width:120px;background:#fafafa;border-radius:11px;padding:.8rem .95rem;border:1px solid var(--border);}
.adm-sum-num{font-size:1.45rem;font-weight:700;font-family:'Noto Serif TC',serif;color:var(--primary);}
.adm-sum-lbl{font-size:.73rem;color:var(--muted);margin-top:.18rem;}

/* ── PROFILE ── */
.profile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.9rem;}
.pf-key{font-size:.74rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.25rem;}
.pf-val{font-size:.9rem;font-weight:500;}
.pwd-btn{padding:.44rem 1rem;border:1.5px solid var(--border);border-radius:9px;background:transparent;
  font-family:'Noto Sans TC',sans-serif;font-size:.8rem;cursor:pointer;color:var(--grey);transition:all .2s;}
.pwd-btn:hover{border-color:var(--primary);color:var(--primary);}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;}
.modal-box{background:var(--card);border-radius:18px;padding:1.8rem 2rem;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.18);animation:fadeUp .3s ease;}
.modal-title{font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:700;margin-bottom:1rem;color:var(--grey);}
.modal-btns{display:flex;gap:.7rem;margin-top:1.3rem;justify-content:flex-end;}
.btn-sec{padding:.5rem 1rem;border:1.5px solid var(--border);border-radius:9px;background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:.86rem;cursor:pointer;color:var(--grey);transition:all .2s;}
.btn-sec:hover{background:var(--bg);}
.btn-ok{padding:.5rem 1.3rem;border:none;border-radius:9px;background:var(--primary);color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:.86rem;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-ok:hover{background:var(--primary-dark);}

.empty{color:var(--muted);font-size:.86rem;text-align:center;padding:1.2rem 0;}
.adm-row-click{cursor:pointer;transition:background .15s;}
.adm-row-click:hover td{background:#fff5e8 !important;}
.adm-code-link{color:var(--primary);font-weight:700;text-decoration:underline;text-underline-offset:3px;}
.adm-detail-prog{display:flex;align-items:center;gap:.8rem;padding:.6rem 0;border-bottom:1px solid #f0f0f0;}
.adm-detail-prog:last-child{border-bottom:none;}
.adm-detail-prog-label{font-size:.86rem;flex:1;min-width:0;}
.adm-detail-prog-bar-bg{background:#eee;border-radius:100px;height:8px;width:100px;overflow:hidden;flex-shrink:0;}
.adm-detail-prog-bar-fill{height:100%;border-radius:100px;}
.adm-detail-badge{display:inline-flex;align-items:center;gap:.2rem;padding:.18rem .6rem;border-radius:100px;font-size:.73rem;font-weight:600;flex-shrink:0;width:76px;justify-content:center;}
/* ── ACTIVITY NOT-DONE LIST ── */
.act-stat-row{cursor:pointer;}
.act-stat-row:hover{background:#fff5e8;}
.act-stat-row.expanded .expand-icon{transform:rotate(180deg);}
.act-notdone-panel{background:#fafafa;border-radius:10px;padding:.9rem 1.1rem;
  margin:.1rem 0 .4rem 22px;border:1px solid #ece8e2;display:none;}
.act-notdone-panel.open{display:block;}
.act-notdone-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem;flex-wrap:wrap;gap:.4rem;}
.act-notdone-title{font-size:.82rem;font-weight:700;color:var(--grey);}
.act-notdone-count{font-size:.78rem;padding:.18rem .65rem;border-radius:100px;font-weight:600;}
.anc-red{background:#fdf0ee;color:var(--danger);}
.anc-green{background:#e8f5ee;color:var(--success);}
.chips-wrap{display:flex;flex-wrap:wrap;gap:.4rem;}
.code-chip{padding:.25rem .65rem;border-radius:8px;font-size:.8rem;font-weight:600;
  background:#fff;border:1.5px solid var(--border);color:var(--primary);
  cursor:pointer;transition:all .18s;}
.code-chip:hover{background:var(--primary);color:#fff;border-color:var(--primary);}
.act-stat-row-wrap{border-bottom:1px solid #f0f0f0;}
.act-stat-row-wrap:last-child{border-bottom:none;}
.act-stat-row{border-bottom:none !important;}
.expand-icon{font-size:.72rem;color:var(--muted);margin-left:.3rem;transition:transform .22s;flex-shrink:0;width:14px;text-align:center;}
.all-done-msg{font-size:.82rem;color:var(--success);font-weight:500;}
/* ── EDIT MODE ── */
.chip-edit-mode .code-chip{background:#fff8f0;border-color:var(--primary);color:var(--primary-dark);}
.chip-edit-mode .code-chip:hover{background:var(--success);border-color:var(--success);color:#fff;}
.chip-edit-mode .code-chip::after{content:' ✓';font-size:.7rem;opacity:.7;}
.edit-toggle-btn{padding:.26rem .75rem;border-radius:100px;border:1.5px solid var(--border);
  background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:.78rem;font-weight:600;
  cursor:pointer;transition:all .2s;color:var(--muted);}
.edit-toggle-btn.active{background:#fff3e0;border-color:var(--primary);color:var(--primary-dark);}
.edit-toggle-btn:hover:not(.active){border-color:var(--primary);color:var(--primary);}
.edit-hint{font-size:.76rem;color:var(--primary-dark);background:#fff8f0;border:1px solid rgba(224,123,0,.25);
  border-radius:8px;padding:.45rem .8rem;margin-top:.55rem;display:none;}
.edit-hint.show{display:block;}
.save-indicator{display:inline-flex;align-items:center;gap:.3rem;font-size:.76rem;
  color:var(--success);font-weight:600;opacity:0;transition:opacity .4s;}
.save-indicator.show{opacity:1;}



/* ── ADMIN VIEW TOGGLE ── */
.adm-view-toggle{display:flex;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap;}
.adm-view-btn{padding:.55rem 1.2rem;border:2px solid var(--border);border-radius:10px;background:#fff;
  font-family:'Noto Sans TC',sans-serif;font-size:.86rem;font-weight:500;cursor:pointer;color:var(--muted);transition:all .22s;}
.adm-view-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600;}
.adm-view-btn:hover:not(.active){border-color:var(--primary);color:var(--primary);}

/* ── ACTIVITY STATS ── */
.act-stat-row{display:flex;align-items:center;gap:1rem;padding:.85rem 0;border-bottom:1px solid #f0f0f0;}
.act-stat-row:last-child{border-bottom:none;}
.act-stat-num{font-size:.78rem;color:var(--muted);width:22px;flex-shrink:0;text-align:right;}
.act-stat-name{flex:1;font-size:.9rem;font-weight:500;min-width:0;}
.act-stat-bar-wrap{width:180px;flex-shrink:0;}
.act-stat-bar-bg{background:#eee;border-radius:100px;height:10px;overflow:hidden;}
.act-stat-bar-fill{height:100%;border-radius:100px;transition:width .8s ease;}
.fill-high{background:linear-gradient(90deg,#2e7d3e,#52a865);}
.fill-mid{background:linear-gradient(90deg,var(--primary),var(--accent));}
.fill-low{background:linear-gradient(90deg,#c0392b,#e74c3c);}
.act-stat-count{font-size:.84rem;color:var(--muted);width:52px;text-align:right;flex-shrink:0;}
.act-stat-pct{font-size:.92rem;font-weight:700;width:44px;text-align:right;flex-shrink:0;}
.act-stat-section{font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--muted);padding:.6rem 0 .4rem;border-bottom:1.5px solid var(--border);margin-bottom:.2rem;}
.act-stat-summary{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1.2rem;padding-bottom:1.1rem;border-bottom:1.5px solid var(--border);}
.act-stat-sum-box{flex:1;min-width:110px;background:#fafafa;border-radius:10px;padding:.7rem .9rem;border:1px solid var(--border);text-align:center;}
.act-stat-sum-num{font-size:1.4rem;font-weight:700;font-family:'Noto Serif TC',serif;color:var(--primary);}
.act-stat-sum-lbl{font-size:.72rem;color:var(--muted);}
@media(max-width:600px){.act-stat-bar-wrap{width:90px;}.act-stat-name{font-size:.82rem;}}

.toast{position:fixed;bottom:2rem;right:2rem;background:#333;color:#fff;padding:.72rem 1.1rem;border-radius:11px;font-size:.84rem;box-shadow:0 8px 24px rgba(0,0,0,.22);z-index:9999;display:none;animation:slideIn .3s ease;}

@media(max-width:600px){
  .ban-stats{gap:.9rem;}.stat-num{font-size:1.3rem;}
  .tb-title{display:none;}
  .prog-label{min-width:95px;font-size:.76rem;}
  .logo-wrap{width:200px;}
}
</style>

      </div>
      <div class="tab-row" id="tab-row">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">登入</button>

      </div>

      <!-- LOGIN -->
      <div id="form-login">
        <div class="fg"><label class="fl">登入名稱</label>
          <input class="fi" id="l-user" type="text" placeholder="輸入登入名稱" autocomplete="username"></div>
        <div class="fg"><label class="fl">密碼</label>
          <input class="fi" id="l-pwd" type="password" placeholder="輸入密碼" autocomplete="current-password"></div>
        <button class="btn-main" id="login-btn" onclick="doLogin()">登入</button>
        <p class="auth-note" id="auth-note"></p>
      </div>

      <!-- REGISTER (mentor only) -->
      <div id="form-reg" style="display:none">
        <div class="fg"><label class="fl">友師編號 <small>（由秘書處提供）</small></label>
          <input class="fi" id="r-code" type="text" placeholder="例：M001–M115" style="text-transform:uppercase"></div>
        <div class="fg"><label class="fl">自訂登入名稱</label>
          <input class="fi" id="r-user" type="text" placeholder="4–20個字元，英文字母或數字" autocomplete="username"></div>
        <div class="fg"><label class="fl">設立密碼</label>
          <input class="fi" id="r-pwd" type="password" placeholder="最少8個字元" autocomplete="new-password"></div>
        <div class="fg"><label class="fl">確認密碼</label>
          <input class="fi" id="r-pwd2" type="password" placeholder="再次輸入密碼" autocomplete="new-password"></div>
        <button class="btn-main btn-mentor" id="reg-btn" onclick="doRegister()">建立帳戶</button>
        <p class="auth-note">每個編號只可註冊一次<br>如未有編號，請聯絡計劃秘書處</p>

// ── STORE (mentor accounts only) ──
const US = JSON.parse(localStorage.getItem('pdp_u') || '{}');
function saveUS() { localStorage.setItem('pdp_u', JSON.stringify(US)); }
let curRole = 'family', curUser = null;

// ── HELPERS ──
function ge(id) { return document.getElementById(id); }
function set(id, d) { ge(id).style.display = d; }
function pct(d,t) { return t>0 ? Math.round(d/t*100) : 0; }
function showErr(m) { const e=ge('err-box'); e.textContent=m; e.style.display='block'; }
function clearErr() { ge('err-box').style.display='none'; }

// ── NAV ──
function showLanding() {
  set('landing','flex'); set('auth-page','none'); set('dashboard','none');
}

function showAuth(role) {
  curRole = role;
  set('landing','none'); set('auth-page','flex'); set('dashboard','none');
  const badge = ge('auth-badge');
  const loginBtn = ge('login-btn');
  const tabRow = ge('tab-row');
  const authNote = ge('auth-note');

  if (role === 'family') {
    badge.textContent = '🏠 家庭單位'; badge.className = 'auth-badge';
    loginBtn.className = 'btn-main';
    tabRow.style.display = 'none';
    ge('form-login').style.display = 'block';
    ge('form-reg').style.display = 'none';
    authNote.textContent = '請使用秘書處提供的登入名稱及密碼';
    ge('l-user').placeholder = '輸入帳戶名稱（如 C001）';
    ge('l-pwd').placeholder = '輸入密碼';
  } else if (role === 'mentor') {
    badge.textContent = '🤝 友師 Mentor'; badge.className = 'auth-badge ab-mentor';
    loginBtn.className = 'btn-main btn-mentor';
    tabRow.style.display = 'flex';
    authNote.textContent = '首次使用？請點擊「首次註冊」建立帳戶';
    ge('l-user').placeholder = '輸入登入名稱';
    ge('l-pwd').placeholder = '輸入密碼';
    switchTab('login');
  } else {
    badge.textContent = '🔑 管理員'; badge.className = 'auth-badge ab-admin';
    loginBtn.className = 'btn-main btn-admin';
    tabRow.style.display = 'none';
    ge('form-login').style.display = 'block';
    ge('form-reg').style.display = 'none';
    authNote.textContent = '';
    ge('l-user').placeholder = '管理員帳戶';
    ge('l-pwd').placeholder = '管理員密碼';
  }
  clearErr();
}

function switchTab(t) {
  ge('tab-login').classList.toggle('active', t==='login');
  ge('tab-reg').classList.toggle('active', t==='reg');
  ge('form-login').style.display = t==='login' ? 'block' : 'none';
  ge('form-reg').style.display = t==='reg' ? 'block' : 'none';
  clearErr();
}

// ── AUTH ──
function doLogin() {
  const u = ge('l-user').value.trim(), p = ge('l-pwd').value;
  clearErr();
  if (!u||!p) { showErr('請填寫所有欄位'); return; }

  // Admin
  if (curRole === 'admin') {
    if (u==='C000' && p==='CDF10') {
      curUser = {username:'C000', role:'admin', code:'C000', regDate:'—'};
      renderDash(); return;
    }
    showErr('管理員帳戶或密碼錯誤'); return;
  }

  // Family: check against FAMILY_DB built-in password
  if (curRole === 'family') {
    const code = u.toUpperCase();
    const fd = FAMILY_DB[code];
    if (!fd) { showErr('找不到此帳戶，請確認帳戶名稱或聯絡秘書處'); return; }
    if (p !== fd.password) { showErr('密碼錯誤，請重試'); return; }
    curUser = {username:code, role:'family', code, regDate:'—'};
    renderDash(); return;
  }

  // Mentor: check localStorage
  const k = 'mentor:'+u, rec = US[k];
  if (!rec || rec.password !== p) { showErr('登入名稱或密碼錯誤，請重試'); return; }
  curUser = {...rec, username:u, role:'mentor'};
  renderDash();
}

function doRegister() {
  const code = ge('r-code').value.trim().toUpperCase();
  const u    = ge('r-user').value.trim();
  const p    = ge('r-pwd').value;
  const p2   = ge('r-pwd2').value;
  clearErr();
  if (!code||!u||!p||!p2) { showErr('請填寫所有欄位'); return; }
  if (u.length<4||u.length>20) { showErr('登入名稱須為4–20個字元'); return; }
  if (!/^[a-zA-Z0-9_]+$/.test(u)) { showErr('登入名稱只可包含英文字母、數字及底線'); return; }
  if (p.length<8) { showErr('密碼最少8個字元'); return; }
  if (p!==p2) { showErr('兩次輸入的密碼不符'); return; }
  const num = parseInt(code.slice(1));
  if (!/^M\d{3}$/.test(code)||num<1||num>115)
    { showErr('友師編號格式為 M001–M115，請確認或聯絡秘書處'); return; }
  const uk = 'mentor:'+u;
  if (US[uk]) { showErr('此登入名稱已被使用，請選擇其他名稱'); return; }
  const ck = 'reg:mentor:'+code;
  if (US[ck]) { showErr('此編號已完成註冊。如有問題，請聯絡秘書處'); return; }
  US[uk] = {password:p, code, role:'mentor', regDate:new Date().toLocaleDateString('zh-HK')};
  US[ck] = u;
  saveUS();
  showToast('✅ 帳戶建立成功！請登入');
  switchTab('login');
  ge('l-user').value = u; ge('l-pwd').value = '';
}

function doLogout() {
  curUser = null; set('dashboard','none'); showLanding(); showToast('已成功登出');
}

// ── DASHBOARD ──
function renderDash() {
  set('auth-page','none'); set('dashboard','block');
  const isMentor = curUser.role==='mentor';
  const isAdmin  = curUser.role==='admin';
  const code = curUser.code;

  const chip = ge('user-chip');
  chip.textContent = (isAdmin?'🔑 ':isMentor?'🤝 ':'🏠 ') + curUser.username;
  chip.className = 'user-chip ' + (isAdmin?'uc-admin':isMentor?'uc-mentor':'uc-family');

  ge('banner').className = 'banner ' + (isAdmin?'banner-admin':isMentor?'banner-mentor':'banner-family');
  ge('ban-name').textContent = isAdmin ? '管理員總覽' : '歡迎回來，' + code + '！';
  ge('ban-sub').textContent  = isAdmin
    ? '今日：' + new Date().toLocaleDateString('zh-HK') + '　·　可查閱所有家庭及友師出席資料'
    : '帳戶：' + code + '　·　今日：' + new Date().toLocaleDateString('zh-HK');

  set('admin-section', isAdmin ? 'block' : 'none');
  set('fam-section', 'none');
  set('act-card', isAdmin ? 'none' : 'block');
  ge('pwd-btn').style.display = isAdmin ? 'none' : '';

  if (isAdmin)       { renderAdmin(); renderAdminProfile(); }
  else if (isMentor) { renderMentor(code); renderProfile(); }
  else               { renderFamily(code); renderProfile(); }
}

// ── FAMILY ──
function renderFamily(code) {
  const fd = FAMILY_DB[code];
  if (!fd) { ge('act-card').innerHTML='<p class="empty">找不到活動資料，請聯絡秘書處</p>'; return; }
  const sa=fd.studentActivities, pa=fd.parentActivities;
  const sd=sa.filter(a=>a.status==='已完成').length, pd=pa.filter(a=>a.status==='已完成').length;
  const tot=sa.length+pa.length, done=sd+pd;
  const rate=pct(done,tot), sr=pct(sd,sa.length), pr=pct(pd,pa.length);
  ge('s-a').textContent=tot; ge('s-a-l').textContent='總活動項目';
  ge('s-b').textContent=done; ge('s-b-l').textContent='已完成';
  ge('s-c').textContent=rate+'%'; ge('s-c-l').textContent='完成率';
  ge('act-card').innerHTML =
    progRows([['🎒 學生活動',sr,false],['👨‍👩‍👧 家長活動',pr,false],['📊 整體',rate,false]]) +
    '<div class="act-label">🎒 學生活動（'+sd+'/'+sa.length+' 已完成）</div>' + actTable(sa) +
    '<div class="act-label">👨‍👩‍👧 家長活動（'+pd+'/'+pa.length+' 已完成）</div>' + actTable(pa);
}

// ── MENTOR ──
function renderMentor(code) {
  set('fam-section','block');
  const md = MENTOR_DB[code];
  if (md && md.activities && md.activities.length) {
    const acts=md.activities, done=acts.filter(a=>a.status==='已完成').length, rate=pct(done,acts.length);
    ge('s-a').textContent=acts.length; ge('s-a-l').textContent='友師活動項目';
    ge('s-b').textContent=done; ge('s-b-l').textContent='已完成';
    ge('s-c').textContent=rate+'%'; ge('s-c-l').textContent='完成率';
    ge('act-card').innerHTML =
      progRows([['📊 友師活動完成率',rate,true]]) +
      '<div class="act-label">🤝 友師活動（'+done+'/'+acts.length+' 已完成）</div>' + actTable(acts);
  } else {
    ge('act-card').innerHTML='<p class="empty">暫無友師活動資料</p>';
    ge('s-a').textContent=ge('s-b').textContent=ge('s-c').textContent='—';
  }
  const families=(md?md.families||[]:[]);
  if (!families.length) { ge('fam-card').innerHTML='<p class="empty">暫未有配對家庭</p>'; return; }
  ge('fam-card').innerHTML = families.map(fc=>{
    const fd=FAMILY_DB[fc]; if(!fd) return '';
    const all=[...fd.studentActivities,...fd.parentActivities];
    const d=all.filter(a=>a.status==='已完成').length,t=all.length,p=pct(d,t);
    const sd=fd.studentActivities.filter(a=>a.status==='已完成').length;
    const pd=fd.parentActivities.filter(a=>a.status==='已完成').length;
    return `<div class="fam-card"><div class="fam-head"><span class="fam-code">${fc}</span>
      <div class="mini-prog"><div class="mini-wrap"><div class="mini-bar" style="width:${p}%"></div></div>
      <span class="mini-pct">${p}%</span></div></div>
      <div class="fam-detail">學生活動：${sd}/${fd.studentActivities.length} 已完成　·　家長活動：${pd}/${fd.parentActivities.length} 已完成</div>
    </div>`;
  }).join('');
}

// ── HELPERS ──
function progRows(arr){
  return '<div style="margin-bottom:1.2rem">'+arr.map(([l,v,isMentor])=>
    `<div class="prog-row"><span class="prog-label">${l}</span>

// ── ADMIN ──
let admCurrentTab='family', admAllRows=[], admCurrentActTab='student';

function renderAdmin(){
  set('fam-section','none');
  const tf=Object.keys(FAMILY_DB).length, tm=Object.keys(MENTOR_DB).length;
  let fd_done=0,fd_tot=0,md_done=0,md_tot=0;
  Object.values(FAMILY_DB).forEach(fd=>{const a=[...fd.studentActivities,...fd.parentActivities];fd_tot+=a.length;fd_done+=a.filter(x=>x.status==='已完成').length;});
  Object.values(MENTOR_DB).forEach(md=>{if(!md.activities)return;md_tot+=md.activities.length;md_done+=md.activities.filter(x=>x.status==='已完成').length;});
  ge('s-a').textContent=tf; ge('s-a-l').textContent='家庭單位';

  ge('s-c').textContent=pct(fd_done+md_done,fd_tot+md_tot)+'%'; ge('s-c-l').textContent='整體完成率';

function admViewSwitch(view){
  ge('vbtn-overview').classList.toggle('active', view==='overview');
  ge('vbtn-activity').classList.toggle('active', view==='activity');
  ge('adm-view-overview').style.display = view==='overview' ? 'block' : 'none';
  ge('adm-view-activity').style.display = view==='activity' ? 'block' : 'none';
  if(view==='activity') admActSwitch(admCurrentActTab);
}

function admActSwitch(tab){
  admCurrentActTab=tab;
  ['student','parent','mentor'].forEach(t=>{
    const el=ge('adm-act-tab-'+t);
    if(el) el.classList.toggle('active', t===tab);
  });
  admRenderActStats(tab);
}

function admRenderActStats(tab){
  const card = ge('adm-act-card');
  let acts=[], total=0, groupLabel='';

  if(tab==='student'){
    const sample=Object.values(FAMILY_DB)[0].studentActivities;
    total=Object.keys(FAMILY_DB).length; groupLabel='家庭單位（學生）';
    acts=sample.map(function(a,i){
      return {
        name:a.name,
        done:Object.values(FAMILY_DB).filter(function(fd){return fd.studentActivities[i]&&fd.studentActivities[i].status==='已完成';}).length,
        notDone:Object.entries(FAMILY_DB).filter(function(e){var fd=e[1];return !(fd.studentActivities[i]&&fd.studentActivities[i].status==='已完成');}).map(function(e){return e[0];})
      };
    });
  } else if(tab==='parent'){
    const sample=Object.values(FAMILY_DB)[0].parentActivities;
    total=Object.keys(FAMILY_DB).length; groupLabel='家庭單位（家長）';
    acts=sample.map(function(a,i){
      return {
        name:a.name,
        done:Object.values(FAMILY_DB).filter(function(fd){return fd.parentActivities[i]&&fd.parentActivities[i].status==='已完成';}).length,
        notDone:Object.entries(FAMILY_DB).filter(function(e){var fd=e[1];return !(fd.parentActivities[i]&&fd.parentActivities[i].status==='已完成');}).map(function(e){return e[0];})
      };
    });
  } else {
    const sample=Object.values(MENTOR_DB)[0].activities||[];
    total=Object.keys(MENTOR_DB).length; groupLabel='友師';
    acts=sample.map(function(a,i){
      return {
        name:a.name,
        done:Object.values(MENTOR_DB).filter(function(md){return md.activities&&md.activities[i]&&md.activities[i].status==='已完成';}).length,
        notDone:Object.entries(MENTOR_DB).filter(function(e){var md=e[1];return !(md.activities&&md.activities[i]&&md.activities[i].status==='已完成');}).map(function(e){return e[0];})
      };
    });
  }

  const rates=acts.map(function(a){return pct(a.done,total);});
  const avgRate=Math.round(rates.reduce(function(s,r){return s+r;},0)/rates.length);
  const highest=acts.reduce(function(m,a){return pct(a.done,total)>pct(m.done,total)?a:m;},acts[0]);
  const lowest=acts.reduce(function(m,a){return pct(a.done,total)<pct(m.done,total)?a:m;},acts[0]);

  var h='<div class="act-stat-summary">'
    +'<div class="act-stat-sum-box"><div class="act-stat-sum-num">'+total+'</div><div class="act-stat-sum-lbl">'+groupLabel+'總數</div></div>'
    +'<div class="act-stat-sum-box"><div class="act-stat-sum-num">'+acts.length+'</div><div class="act-stat-sum-lbl">活動項目總數</div></div>'
    +'<div class="act-stat-sum-box"><div class="act-stat-sum-num" style="color:var(--primary)">'+avgRate+'%</div><div class="act-stat-sum-lbl">平均完成率</div></div>'
    +'<div class="act-stat-sum-box"><div class="act-stat-sum-num pct-high">'+pct(highest.done,total)+'%</div><div class="act-stat-sum-lbl">最高：'+(highest.name.length>10?highest.name.slice(0,10)+'…':highest.name)+'</div></div>'
    +'<div class="act-stat-sum-box"><div class="act-stat-sum-num pct-low">'+pct(lowest.done,total)+'%</div><div class="act-stat-sum-lbl">最低：'+(lowest.name.length>10?lowest.name.slice(0,10)+'…':lowest.name)+'</div></div>'
    +'</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:.9rem;">'
    +'<div style="font-size:.78rem;color:var(--muted);">💡 點擊活動列，即可展開查看未完成名單</div>'
    +'<button class="edit-toggle-btn" id="edit-toggle-btn" onclick="toggleEditMode()">✏️ 編輯出席記錄</button>'
    +'</div>'
    +'<div class="edit-hint" id="edit-hint">✏️ 編輯模式：點擊編號即可將該家庭標記為<strong>已完成</strong>此活動。修改會即時生效。</div>';

  h += acts.map(function(a,i){
    var r=pct(a.done,total), nd=a.notDone.length;
    var fillCls=r>=80?'fill-high':r>=50?'fill-mid':'fill-low';
    var pctCls=r>=80?'pct-high':r>=50?'pct-mid':'pct-low';
    var panelId='ndp-'+tab+'-'+i, rowId='ndr-'+tab+'-'+i;

    var chips;
    if(nd===0){
      chips='<span class="all-done-msg">✅ 全部已完成！</span>';
    } else {
      chips=a.notDone.map(function(c){
        var chipId='chip-'+tab+'-'+i+'-'+c;
        return '<span class="code-chip" id="'+chipId+'" onclick="event.stopPropagation();handleChipClick(\''+tab+'\','+i+',\''+c+'\',\''+chipId+'\',\''+panelId+'\',\''+rowId+'\')">'+c+'</span>';
      }).join('');
    }

    var countBadge = nd===0
      ? '<span class="act-notdone-count anc-green">全部完成</span>'
      : '<span class="act-notdone-count anc-red">'+nd+' 個未完成</span>';

    return '<div class="act-stat-row-wrap">'
      +'<div class="act-stat-row" id="'+rowId+'" onclick="toggleNotDone(\''+panelId+'\',\''+rowId+'\')">'
      +'<div class="act-stat-num">'+(i+1)+'</div>'
      +'<div class="act-stat-name">'+a.name+'</div>'
      +'<div class="act-stat-bar-wrap"><div class="act-stat-bar-bg"><div class="act-stat-bar-fill '+fillCls+'" style="width:'+r+'%"></div></div></div>'
      +'<div class="act-stat-count">'+a.done+'/'+total+'</div>'
      +'<div class="act-stat-pct '+pctCls+'">'+r+'%</div>'
      +'<div class="expand-icon">▼</div>'
      +'</div>'
      +'<div class="act-notdone-panel" id="'+panelId+'">'
      +'<div class="act-notdone-header"><span class="act-notdone-title">未完成名單</span>'+countBadge+'</div>'
      +'<div class="chips-wrap">'+chips+'</div>'
      +'</div>'
      +'</div>';
  }).join('');

  card.innerHTML=h;
  if(editMode) toggleEditMode();
}

function toggleNotDone(panelId, rowId){
  var panel=ge(panelId), row=ge(rowId);
  var isOpen=panel.classList.contains('open');
  document.querySelectorAll('.act-notdone-panel.open').forEach(function(p){p.classList.remove('open');});
  document.querySelectorAll('.act-stat-row.expanded').forEach(function(r){r.classList.remove('expanded');});
  if(!isOpen){ panel.classList.add('open'); row.classList.add('expanded'); }
}

function admSwitch(tab){
  admCurrentTab=tab;
  ge('adm-tab-family').classList.toggle('active',tab==='family');
  ge('adm-tab-mentor').classList.toggle('active',tab==='mentor');
  ge('adm-search').value='';
  admBuildRows(); admRender(admAllRows);
}

function admBuildRows(){
  if(admCurrentTab==='family'){
    admAllRows=Object.entries(FAMILY_DB).map(([code,fd])=>{
      const sa=fd.studentActivities,pa=fd.parentActivities;
      const sd=sa.filter(a=>a.status==='已完成').length,pd=pa.filter(a=>a.status==='已完成').length;
      const tot=sa.length+pa.length,done=sd+pd;
      return {code,sd,st:sa.length,pd,pt:pa.length,done,tot,rate:pct(done,tot)};
    }).sort((a,b)=>a.code.localeCompare(b.code));
    const td=admAllRows.reduce((s,r)=>s+r.done,0),tt=admAllRows.reduce((s,r)=>s+r.tot,0);
    const h=admAllRows.filter(r=>r.rate>=80).length,m=admAllRows.filter(r=>r.rate>=50&&r.rate<80).length,l=admAllRows.filter(r=>r.rate<50).length;
    ge('adm-summary').innerHTML=sumBoxes([['家庭總數',admAllRows.length,''],['整體完成率',pct(td,tt)+'%',''],['≥80%',h,'pct-high'],['50–79%',m,'pct-mid'],['<50%',l,'pct-low']]);
    ge('adm-thead').innerHTML='<tr><th>編號</th><th>學生活動</th><th>家長活動</th><th>整體進度</th><th>完成率</th></tr>';
  } else {
    admAllRows=Object.entries(MENTOR_DB).map(([code,md])=>{
      const acts=md.activities||[],done=acts.filter(a=>a.status==='已完成').length,tot=acts.length;
      return {code,done,tot,rate:pct(done,tot),fams:(md.families||[]).length};
    }).sort((a,b)=>a.code.localeCompare(b.code));
    const td=admAllRows.reduce((s,r)=>s+r.done,0),tt=admAllRows.reduce((s,r)=>s+r.tot,0);
    const h=admAllRows.filter(r=>r.rate>=80).length,m=admAllRows.filter(r=>r.rate>=50&&r.rate<80).length,l=admAllRows.filter(r=>r.rate<50).length;
    ge('adm-summary').innerHTML=sumBoxes([['友師總數',admAllRows.length,''],['整體完成率',pct(td,tt)+'%',''],['≥80%',h,'pct-high'],['50–79%',m,'pct-mid'],['<50%',l,'pct-low']]);
    ge('adm-thead').innerHTML='<tr><th>編號</th><th>負責家庭</th><th>友師活動</th><th>整體進度</th><th>完成率</th></tr>';
  }
}

function sumBoxes(arr){
  return arr.map(([l,v,cls])=>`<div class="adm-sum-box"><div class="adm-sum-num ${cls}">${v}</div><div class="adm-sum-lbl">${l}</div></div>`).join('');
}

function admRender(rows){
  if(admCurrentTab==='family'){
    ge('adm-tbody').innerHTML=rows.map(r=>{
      const cls=r.rate>=80?'pct-high':r.rate>=50?'pct-mid':'pct-low';
      const bcls=r.rate>=80?'bar-high':r.rate>=50?'bar-mid':'bar-low';
      return `<tr class="adm-row-click" onclick="openAdmDetail('${r.code}')">
        <td><span class="adm-code-link">${r.code}</span></td>
        <td>${r.sd}/${r.st}</td><td>${r.pd}/${r.pt}</td>
        <td><div class="adm-mini-wrap"><div class="adm-mini-bar ${bcls}" style="width:${r.rate}%"></div></div>${r.done}/${r.tot}</td>
        <td><span class="adm-pct ${cls}">${r.rate}%</span></td></tr>`;
    }).join('');
  } else {
    ge('adm-tbody').innerHTML=rows.map(r=>{
      const cls=r.rate>=80?'pct-high':r.rate>=50?'pct-mid':'pct-low';
      const bcls=r.rate>=80?'bar-high':r.rate>=50?'bar-mid':'bar-low';
      return `<tr><td class="adm-code">${r.code}</td><td>${r.fams} 個家庭</td><td>${r.done}/${r.tot}</td>
        <td><div class="adm-mini-wrap"><div class="adm-mini-bar ${bcls}" style="width:${r.rate}%"></div></div>${r.done}/${r.tot}</td>
        <td><span class="adm-pct ${cls}">${r.rate}%</span></td></tr>`;
    }).join('');

function admFilter(){
  const q=ge('adm-search').value.trim().toUpperCase();
  admRender(q?admAllRows.filter(r=>r.code.includes(q)):admAllRows);
}

function admExport(){
  const tab=admCurrentTab;
  let csv=tab==='family'?'編號,學生活動完成,學生活動總數,家長活動完成,家長活動總數,整體完成,整體總數,完成率\n':'編號,負責家庭數,友師活動完成,友師活動總數,完成率\n';

    csv+=tab==='family'?`${r.code},${r.sd},${r.st},${r.pd},${r.pt},${r.done},${r.tot},${r.rate}%\n`:`${r.code},${r.fams},${r.done},${r.tot},${r.rate}%\n`;
  });
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=(tab==='family'?'家庭單位':'友師')+'出席報告_'+new Date().toLocaleDateString('zh-HK').replace(/\//g,'-')+'.csv';
  a.click();
}


// ── EDIT MODE ──
let editMode = false;
let currentActTab = 'student';

function toggleEditMode(){
  editMode = !editMode;
  const btn = ge('edit-toggle-btn');
  const hint = ge('edit-hint');
  if(btn){ btn.classList.toggle('active', editMode); btn.textContent = editMode ? '✅ 完成編輯' : '✏️ 編輯出席記錄'; }
  if(hint){ hint.classList.toggle('show', editMode); }
  // Toggle chip-edit-mode on all panels
  document.querySelectorAll('.chips-wrap').forEach(w => w.classList.toggle('chip-edit-mode', editMode));
}

function handleChipClick(tab, actIdx, code, chipId, panelId, rowId){
  if(!editMode){
    // View mode: open detail modal
    openAdmDetail(code);
    return;
  }
  // Edit mode: mark as completed
  markActivityDone(tab, actIdx, code, chipId, panelId, rowId);
}

function markActivityDone(tab, actIdx, code, chipId, panelId, rowId){
  // Update FAMILY_DB in memory
  if(tab==='student'){
    if(FAMILY_DB[code] && FAMILY_DB[code].studentActivities[actIdx]){
      FAMILY_DB[code].studentActivities[actIdx].status = '已完成';
    }
  } else if(tab==='parent'){
    if(FAMILY_DB[code] && FAMILY_DB[code].parentActivities[actIdx]){
      FAMILY_DB[code].parentActivities[actIdx].status = '已完成';
    }
  }

  // Animate and remove chip
  const chip = ge(chipId);
  if(chip){
    chip.style.transition='all .3s';
    chip.style.background='var(--success)';
    chip.style.borderColor='var(--success)';
    chip.style.color='#fff';
    chip.textContent = code + ' ✓';
    setTimeout(()=>{
      chip.style.opacity='0';
      chip.style.transform='scale(.85)';
      setTimeout(()=>{
        chip.remove();
        // Update panel count badge
        refreshPanelCount(panelId, rowId, tab, actIdx);
        // Refresh overview table row counts if visible
        if(ge('adm-view-overview').style.display!=='none') admBuildRows(), admRender(admAllRows);
      }, 280);
    }, 420);
  }

  // Show save indicator
  showSaveIndicator(panelId);
}

function refreshPanelCount(panelId, rowId, tab, actIdx){
  const panel = ge(panelId);
  if(!panel) return;
  const chips = panel.querySelectorAll('.code-chip');
  const nd = chips.length;
  const row = ge(rowId);

  // Update badge
  const badge = panel.querySelector('.act-notdone-count');
  if(badge){
    if(nd===0){
      badge.textContent='全部完成';
      badge.className='act-notdone-count anc-green';
      panel.querySelector('.chips-wrap').innerHTML='<span class="all-done-msg">✅ 全部已完成！</span>';
    } else {
      badge.textContent=nd+' 個未完成';
    }
  }

  // Update the bar and percentage in the row
  const total = tab==='mentor' ? Object.keys(MENTOR_DB).length : Object.keys(FAMILY_DB).length;
  const done_count = tab==='student'
    ? Object.values(FAMILY_DB).filter(fd=>fd.studentActivities[actIdx]&&fd.studentActivities[actIdx].status==='已完成').length
    : tab==='parent'
    ? Object.values(FAMILY_DB).filter(fd=>fd.parentActivities[actIdx]&&fd.parentActivities[actIdx].status==='已完成').length
    : Object.values(MENTOR_DB).filter(md=>md.activities&&md.activities[actIdx]&&md.activities[actIdx].status==='已完成').length;

  const r = pct(done_count, total);
  const fillCls = r>=80?'fill-high':r>=50?'fill-mid':'fill-low';
  const pctCls  = r>=80?'pct-high':r>=50?'pct-mid':'pct-low';

  if(row){
    const bar = row.querySelector('.act-stat-bar-fill');
    const pctEl = row.querySelector('.act-stat-pct');
    const countEl = row.querySelector('.act-stat-count');
    if(bar){ bar.style.width=r+'%'; bar.className='act-stat-bar-fill '+fillCls; }
    if(pctEl){ pctEl.textContent=r+'%'; pctEl.className='act-stat-pct '+pctCls; }
    if(countEl){ countEl.textContent=done_count+'/'+total; }
  }
}

function showSaveIndicator(panelId){
  const panel = ge(panelId);
  if(!panel) return;
  let ind = panel.querySelector('.save-indicator');
  if(!ind){
    ind = document.createElement('div');
    ind.className='save-indicator';
    ind.innerHTML='✅ 已更新';
    panel.querySelector('.act-notdone-header').appendChild(ind);
  }
  ind.classList.add('show');
  clearTimeout(ind._t);
  ind._t = setTimeout(()=>ind.classList.remove('show'), 2000);
}

// ── ADMIN FAMILY DETAIL ──
function openAdmDetail(code){
  const fd = FAMILY_DB[code];
  if(!fd) return;
  const sa=fd.studentActivities, pa=fd.parentActivities;
  const sd=sa.filter(a=>a.status==='已完成').length, pd=pa.filter(a=>a.status==='已完成').length;
  const tot=sa.length+pa.length, done=sd+pd, rate=pct(done,tot);

  ge('adm-detail-title').textContent = '🏠 ' + code + ' 活動出席詳情';
  ge('adm-detail-sub').textContent = '整體完成率：' + rate + '%　（' + done + '/' + tot + ' 項已完成）';

  const rateCls = rate>=80?'fill-high':rate>=50?'fill-mid':'fill-low';

  let html = '';

  // Overall progress bar
  html += `<div style="background:var(--bg);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.2rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;">
      <span style="font-size:.84rem;font-weight:600;color:var(--grey)">📊 整體進度</span>
      <span style="font-size:1.1rem;font-weight:700;color:var(--primary)">${rate}%</span>
    </div>
    <div style="background:#e0e0e0;border-radius:100px;height:10px;overflow:hidden;">
      <div class="act-stat-bar-fill ${rateCls}" style="width:${rate}%"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:.5rem;font-size:.78rem;color:var(--muted);">
      <span>學生：${sd}/${sa.length}</span><span>家長：${pd}/${pa.length}</span><span>合計：${done}/${tot}</span>
    </div>
  </div>`;

  // Student activities
  html += `<div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
    padding:.5rem 0 .4rem;border-bottom:1.5px solid var(--border);margin-bottom:.1rem;">
    🎒 學生活動（${sd}/${sa.length} 已完成）</div>`;
  html += sa.map((a,i) => {
    const done = a.status==='已完成';
    return `<div class="adm-detail-prog">
      <span style="color:var(--muted);font-size:.76rem;width:20px;flex-shrink:0">${i+1}</span>
      <span class="adm-detail-prog-label">${a.name}</span>
      <span class="adm-detail-badge ${done?'b-done':'b-not'}">${done?'✅ 已完成':'❌ 未完成'}</span>
    </div>`;
  }).join('');

  // Parent activities
  html += `<div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
    padding:.5rem 0 .4rem;border-bottom:1.5px solid var(--border);margin:.8rem 0 .1rem;">
    👨‍👩‍👧 家長活動（${pd}/${pa.length} 已完成）</div>`;
  html += pa.map((a,i) => {
    const done = a.status==='已完成';
    return `<div class="adm-detail-prog">
      <span style="color:var(--muted);font-size:.76rem;width:20px;flex-shrink:0">${i+1}</span>
      <span class="adm-detail-prog-label">${a.name}</span>
      <span class="adm-detail-badge ${done?'b-done':'b-not'}">${done?'✅ 已完成':'❌ 未完成'}</span>
    </div>`;
  }).join('');

  ge('adm-detail-content').innerHTML = html;
  set('adm-detail-modal','flex');
}

function closeAdmDetail(){ set('adm-detail-modal','none'); }

// ── PASSWORD (mentor only) ──
function openPwd(){['op','np','np2'].forEach(id=>ge(id).value='');set('pwd-modal','flex');}
function closePwd(){set('pwd-modal','none');}
function doChangePwd(){
  const o=ge('op').value,n=ge('np').value,n2=ge('np2').value;
  if(!o||!n||!n2){showToast('⚠️ 請填寫所有欄位');return;}
  if(o!==curUser.password){showToast('⚠️ 現有密碼錯誤');return;}
  if(n.length<8){showToast('⚠️ 新密碼最少8個字元');return;}
  if(n!==n2){showToast('⚠️ 兩次輸入的新密碼不符');return;}
  US['mentor:'+curUser.username].password=n; curUser.password=n;
  saveUS(); closePwd(); showToast('✅ 密碼已成功更改');
}

// ── TOAST ──
let toastT;
function showToast(m){const t=ge('toast');t.textContent=m;t.style.display='block';clearTimeout(toastT);toastT=setTimeout(()=>t.style.display='none',3200);}

// ── ENTER KEY ──
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  if(ge('auth-page').style.display==='flex'){
    if(ge('tab-reg')&&ge('tab-reg').classList.contains('active')) doRegister();
    else doLogin();
  }
});

// ── INIT ──
ge('landing').style.cssText='display:flex;flex-direction:column;';
ge('auth-page').style.display='none';
ge('dashboard').style.display='none';
</script>

    </div>
    <div id="adm-detail-content"></div>
  </div>
</div>
