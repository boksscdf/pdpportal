<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭支援計劃 — 參加者查詢系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap');
:root{
  --primary:#1a3a5c;--accent:#e8a020;--accent2:#2e7d5e;
  --bg:#f5f2ed;--card:#fff;--text:#1c1c1e;--muted:#6b7280;--border:#e2ddd6;
  --danger:#c0392b;--success:#27ae60;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* ── LANDING ── */
#landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0f2540 0%,#1a3a5c 55%,#0d4a35 100%);position:relative;overflow:hidden;}
#landing::before{content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");}
.landing-inner{text-align:center;z-index:1;padding:2rem;animation:fadeUp .8s ease both;}
.logo-mark{width:80px;height:80px;background:var(--accent);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:2.2rem;box-shadow:0 8px 32px rgba(232,160,32,.4);}
.land-title{font-family:'Noto Serif TC',serif;font-size:clamp(1.8rem,4vw,2.8rem);color:#fff;font-weight:700;margin-bottom:.4rem;}
.land-sub{color:rgba(255,255,255,.6);font-size:1rem;margin-bottom:2.8rem;letter-spacing:.05em;}
.role-cards{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;}
.role-card{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);
  border-radius:20px;padding:2rem 2.5rem;cursor:pointer;transition:all .3s;min-width:210px;text-align:center;}
.role-card:hover{background:rgba(255,255,255,.15);transform:translateY(-6px);box-shadow:0 20px 40px rgba(0,0,0,.3);}
.role-card .rc-icon{font-size:2.5rem;margin-bottom:.9rem;}
.role-card .rc-label{color:#fff;font-size:1.05rem;font-weight:600;margin-bottom:.3rem;}
.role-card .rc-count{color:rgba(255,255,255,.5);font-size:.82rem;}
.role-card.rc-family{border-color:rgba(232,160,32,.4);}
.role-card.rc-mentor{border-color:rgba(46,125,94,.4);}
.role-card.rc-family:hover{border-color:var(--accent);}
.role-card.rc-mentor:hover{border-color:var(--accent2);}

/* ── AUTH ── */
#auth-page{display:none;min-height:100vh;align-items:center;justify-content:center;background:var(--bg);}
.auth-wrap{width:100%;max-width:460px;padding:1rem;}
.auth-back{display:inline-flex;align-items:center;gap:.4rem;color:var(--muted);font-size:.9rem;cursor:pointer;margin-bottom:1.5rem;transition:color .2s;}
.auth-back:hover{color:var(--text);}
.auth-card{background:var(--card);border-radius:24px;padding:2.5rem;box-shadow:0 4px 32px rgba(0,0,0,.08);border:1px solid var(--border);}
.auth-head{text-align:center;margin-bottom:1.8rem;}
.auth-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.4rem 1rem;border-radius:100px;font-size:.83rem;font-weight:600;margin-bottom:.9rem;}
.auth-badge.ab-family{background:rgba(232,160,32,.12);color:#b07a10;}
.auth-badge.ab-mentor{background:rgba(46,125,94,.12);color:var(--accent2);}
.auth-title{font-family:'Noto Serif TC',serif;font-size:1.55rem;font-weight:700;margin-bottom:.3rem;}
.auth-desc{color:var(--muted);font-size:.88rem;}
.tab-row{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:1.6rem;}
.tab-btn{flex:1;padding:.58rem;border:none;background:transparent;border-radius:9px;font-family:'Noto Sans TC',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;color:var(--muted);transition:all .22s;}
.tab-btn.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.1);}
.fg{margin-bottom:1.1rem;}
.fl{display:block;font-size:.83rem;font-weight:600;margin-bottom:.38rem;}
.fl small{font-weight:400;color:var(--muted);}
.fi{width:100%;padding:.72rem 1rem;border:1.5px solid var(--border);border-radius:11px;font-family:'Noto Sans TC',sans-serif;font-size:.93rem;color:var(--text);background:var(--bg);transition:border-color .2s,box-shadow .2s;outline:none;}
.fi:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,58,92,.1);background:#fff;}
.btn-main{width:100%;padding:.82rem;border:none;border-radius:11px;font-family:'Noto Sans TC',sans-serif;font-size:.97rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:.4rem;}
.btn-family{background:var(--accent);color:#fff;}
.btn-family:hover{background:#c98a18;transform:translateY(-1px);}
.btn-mentor{background:var(--accent2);color:#fff;}
.btn-mentor:hover{background:#246349;transform:translateY(-1px);}
.auth-note{text-align:center;font-size:.8rem;color:var(--muted);margin-top:.9rem;line-height:1.6;}
.err-box{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);color:var(--danger);border-radius:10px;padding:.65rem 1rem;font-size:.85rem;margin-bottom:1rem;display:none;}

/* ── DASHBOARD ── */
#dashboard{display:none;min-height:100vh;background:var(--bg);}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 1.5rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.tb-left{display:flex;align-items:center;gap:1rem;}
.tb-logo{width:36px;height:36px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:1.1rem;}
.tb-title{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;color:var(--primary);}
.tb-right{display:flex;align-items:center;gap:1rem;}
.user-chip{padding:.28rem .8rem;border-radius:100px;font-size:.83rem;font-weight:500;}
.uc-family{background:rgba(232,160,32,.12);color:#b07a10;}
.uc-mentor{background:rgba(46,125,94,.12);color:var(--accent2);}
.logout-btn{padding:.32rem .85rem;border:1.5px solid var(--border);border-radius:100px;background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:.8rem;cursor:pointer;color:var(--muted);transition:all .2s;}
.logout-btn:hover{border-color:var(--danger);color:var(--danger);}

.main{max-width:980px;margin:0 auto;padding:2rem 1.5rem;}

/* Banner */
.banner{border-radius:20px;padding:1.8rem 2rem;color:#fff;margin-bottom:1.8rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.banner-family{background:linear-gradient(135deg,#1a3a5c,#2a4f7a);}
.banner-mentor{background:linear-gradient(135deg,#2e7d5e,#1a5c40);}
.ban-text h2{font-family:'Noto Serif TC',serif;font-size:1.35rem;margin-bottom:.3rem;}
.ban-text p{color:rgba(255,255,255,.68);font-size:.88rem;}
.ban-stats{display:flex;gap:1.5rem;}
.stat-box{text-align:center;}
.stat-num{font-size:1.75rem;font-weight:700;font-family:'Noto Serif TC',serif;}
.banner-family .stat-num{color:#f5c842;}
.banner-mentor .stat-num{color:#7dd4b0;}
.stat-lbl{font-size:.72rem;color:rgba(255,255,255,.58);}

.sec-title{font-family:'Noto Serif TC',serif;font-size:1.12rem;font-weight:700;color:var(--primary);margin-bottom:.9rem;display:flex;align-items:center;gap:.5rem;}
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:1.5rem;margin-bottom:1.5rem;}

/* Progress */
.prog-row{display:flex;align-items:center;gap:1rem;margin-bottom:.75rem;}
.prog-label{font-size:.84rem;min-width:140px;font-weight:500;}
.prog-wrap{background:var(--bg);border-radius:100px;height:8px;overflow:hidden;flex:1;}
.prog-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--accent2),#52c99e);transition:width .8s ease;}
.prog-pct{font-size:.84rem;width:38px;text-align:right;font-weight:700;color:var(--primary);}

/* Activity table */
.act-label{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
  margin:1.3rem 0 .6rem;padding-bottom:.45rem;border-bottom:1.5px solid var(--border);}
.act-label:first-child{margin-top:0;}
.act-table{width:100%;border-collapse:collapse;font-size:.88rem;}
.act-table th{text-align:left;padding:.55rem .8rem;font-weight:600;color:var(--muted);font-size:.76rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:1.5px solid var(--border);}
.act-table td{padding:.82rem .8rem;border-bottom:1px solid var(--border);vertical-align:middle;}
.act-table tr:last-child td{border-bottom:none;}
.act-table tr:hover td{background:var(--bg);}
.badge{display:inline-flex;align-items:center;gap:.25rem;padding:.22rem .7rem;border-radius:100px;font-size:.76rem;font-weight:600;}
.b-done{background:rgba(39,174,96,.12);color:var(--success);}
.b-not{background:rgba(192,57,43,.10);color:var(--danger);}

/* Mentor family cards */
.fam-card{border:1px solid var(--border);border-radius:12px;padding:.9rem 1.1rem;margin-bottom:.7rem;transition:box-shadow .2s,border-color .2s;}
.fam-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);border-color:#c5c0b8;}
.fam-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.35rem;}
.fam-code{font-weight:700;color:var(--primary);font-size:.93rem;}
.mini-prog{display:flex;align-items:center;gap:.55rem;}
.mini-wrap{background:var(--bg);border-radius:100px;height:6px;width:80px;overflow:hidden;}
.mini-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--accent2),#52c99e);}
.mini-pct{font-size:.8rem;font-weight:700;color:var(--accent2);}
.fam-detail{font-size:.82rem;color:var(--muted);}

/* Profile */
.profile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:1rem;}
.pf-key{font-size:.76rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.28rem;}
.pf-val{font-size:.93rem;font-weight:500;}
.pwd-btn{padding:.48rem 1.1rem;border:1.5px solid var(--border);border-radius:10px;background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:.83rem;cursor:pointer;color:var(--text);transition:all .2s;}
.pwd-btn:hover{border-color:var(--primary);color:var(--primary);}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;}
.modal-box{background:var(--card);border-radius:20px;padding:2rem;max-width:430px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:fadeUp .3s ease;}
.modal-title{font-family:'Noto Serif TC',serif;font-size:1.15rem;font-weight:700;margin-bottom:1.1rem;}
.modal-btns{display:flex;gap:.8rem;margin-top:1.4rem;justify-content:flex-end;}
.btn-sec{padding:.55rem 1.1rem;border:1.5px solid var(--border);border-radius:10px;background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:.88rem;cursor:pointer;color:var(--text);transition:all .2s;}
.btn-sec:hover{background:var(--bg);}
.btn-ok{padding:.55rem 1.4rem;border:none;border-radius:10px;background:var(--primary);color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-ok:hover{background:#0f2540;}

.empty{color:var(--muted);font-size:.88rem;text-align:center;padding:1.2rem 0;}
.toast{position:fixed;bottom:2rem;right:2rem;background:#1c1c1e;color:#fff;padding:.75rem 1.15rem;border-radius:12px;font-size:.86rem;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;display:none;animation:slideIn .3s ease;}

@media(max-width:600px){
  .ban-stats{gap:1rem;}.stat-num{font-size:1.35rem;}
  .tb-title{display:none;}
  .prog-label{min-width:100px;font-size:.78rem;}
}
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <div class="landing-inner">
    <div class="logo-mark">🏠</div>
    <h1 class="land-title">家庭支援計劃</h1>
    <p class="land-sub">參加者查詢系統　·　Participant Portal</p>
    <div class="role-cards">
      <div class="role-card rc-family" onclick="showAuth('family')">
        <div class="rc-icon">👨‍👩‍👧‍👦</div>
        <div class="rc-label">家庭單位</div>
        <div class="rc-count">Family Unit · 115戶</div>
      </div>
      <div class="role-card rc-mentor" onclick="showAuth('mentor')">
        <div class="rc-icon">🤝</div>
        <div class="rc-label">友師 Mentor</div>
        <div class="rc-count">Mentor · 115位</div>
      </div>
    </div>
  </div>
</div>

<!-- AUTH -->
<div id="auth-page">
  <div class="auth-wrap">
    <div class="auth-back" onclick="showLanding()">← 返回主頁</div>
    <div class="auth-card">
      <div class="auth-head">
        <div class="auth-badge ab-family" id="auth-badge">🏠 家庭單位</div>
        <h2 class="auth-title">歡迎使用</h2>
        <p class="auth-desc">請登入或首次建立帳戶</p>
      </div>
      <div class="tab-row">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">登入</button>
        <button class="tab-btn" id="tab-reg" onclick="switchTab('reg')">首次註冊</button>
      </div>
      <div class="err-box" id="err-box"></div>

      <!-- LOGIN -->
      <div id="form-login">
        <div class="fg"><label class="fl">登入名稱</label>
          <input class="fi" id="l-user" type="text" placeholder="輸入登入名稱" autocomplete="username"></div>
        <div class="fg"><label class="fl">密碼</label>
          <input class="fi" id="l-pwd" type="password" placeholder="輸入密碼" autocomplete="current-password"></div>
        <button class="btn-main btn-family" id="login-btn" onclick="doLogin()">登入</button>
        <p class="auth-note">首次使用？請點擊「首次註冊」建立帳戶</p>
      </div>

      <!-- REGISTER -->
      <div id="form-reg" style="display:none">
        <div class="fg"><label class="fl">參加者編號 <small>（由秘書處提供）</small></label>
          <input class="fi" id="r-code" type="text" placeholder="家庭：C001–C115　友師：M001–M115" style="text-transform:uppercase"></div>
        <div class="fg"><label class="fl">自訂登入名稱</label>
          <input class="fi" id="r-user" type="text" placeholder="4–20個字元，英文字母或數字" autocomplete="username"></div>
        <div class="fg"><label class="fl">設立密碼</label>
          <input class="fi" id="r-pwd" type="password" placeholder="最少8個字元" autocomplete="new-password"></div>
        <div class="fg"><label class="fl">確認密碼</label>
          <input class="fi" id="r-pwd2" type="password" placeholder="再次輸入密碼" autocomplete="new-password"></div>
        <button class="btn-main btn-family" id="reg-btn" onclick="doRegister()">建立帳戶</button>
        <p class="auth-note">每個編號只可註冊一次<br>如未有編號，請聯絡計劃秘書處</p>
      </div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-logo">🏠</div>
      <div class="tb-title">家庭支援計劃</div>
    </div>
    <div class="tb-right">
      <div class="user-chip uc-family" id="user-chip">👤</div>
      <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="main">
    <!-- Banner -->
    <div class="banner banner-family" id="banner">
      <div class="ban-text">
        <h2 id="ban-name">歡迎回來！</h2>
        <p id="ban-sub"></p>
      </div>
      <div class="ban-stats">
        <div class="stat-box"><div class="stat-num" id="s-a">—</div><div class="stat-lbl" id="s-a-l">總活動項目</div></div>
        <div class="stat-box"><div class="stat-num" id="s-b">—</div><div class="stat-lbl" id="s-b-l">已完成</div></div>
        <div class="stat-box"><div class="stat-num" id="s-c">—</div><div class="stat-lbl" id="s-c-l">完成率</div></div>
      </div>
    </div>

    <!-- Activity -->
    <div class="sec-title"><span>📋</span> 活動完成紀錄</div>
    <div class="card" id="act-card"><p class="empty">載入中…</p></div>

    <!-- Mentor responsible families -->
    <div id="fam-section" style="display:none">
      <div class="sec-title"><span>👨‍👩‍👧</span> 我負責的家庭</div>
      <div class="card" id="fam-card"><p class="empty">載入中…</p></div>
    </div>

    <!-- Profile -->
    <div class="sec-title"><span>👤</span> 帳戶資料</div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem;">
        <span style="font-size:.84rem;color:var(--muted)">如需更改個人資料，請聯絡計劃秘書處</span>
        <button class="pwd-btn" onclick="openPwd()">更改密碼</button>
      </div>
      <div class="profile-grid" id="profile-grid"></div>
    </div>
  </div>
</div>

<!-- Password Modal -->
<div class="modal-ov" id="pwd-modal" onclick="if(event.target===this)closePwd()">
  <div class="modal-box">
    <div class="modal-title">🔐 更改密碼</div>
    <div class="fg"><label class="fl">現有密碼</label><input class="fi" id="op" type="password"></div>
    <div class="fg"><label class="fl">新密碼 <small>（最少8個字元）</small></label><input class="fi" id="np" type="password"></div>
    <div class="fg"><label class="fl">確認新密碼</label><input class="fi" id="np2" type="password"></div>
    <div class="modal-btns">
      <button class="btn-sec" onclick="closePwd()">取消</button>
      <button class="btn-ok" onclick="doChangePwd()">確認更改</button>
    </div>
  </div>
</div>

function showLanding() {
  set('landing','flex'); set('auth-page','none'); set('dashboard','none');
}
function showAuth(role) {
  curRole = role;
  set('landing','none'); set('auth-page','flex'); set('dashboard','none');
  const isMentor = role === 'mentor';
  const badge = ge('auth-badge');
  badge.textContent = isMentor ? '🤝 友師 Mentor' : '🏠 家庭單位';
  badge.className = 'auth-badge ' + (isMentor ? 'ab-mentor' : 'ab-family');
  const cls = 'btn-main ' + (isMentor ? 'btn-mentor' : 'btn-family');
  ge('login-btn').className = cls;
  ge('reg-btn').className = cls;
  switchTab('login'); clearErr();
}
function switchTab(t) {
  ge('tab-login').classList.toggle('active', t==='login');
  ge('tab-reg').classList.toggle('active', t==='reg');
  ge('form-login').style.display = t==='login' ? 'block' : 'none';
  ge('form-reg').style.display = t==='reg' ? 'block' : 'none';
  clearErr();
}
function ge(id) { return document.getElementById(id); }
function set(id, d) { ge(id).style.display = d; }
function showErr(m) { const e=ge('err-box'); e.textContent=m; e.style.display='block'; }
function clearErr() { ge('err-box').style.display='none'; }

// ── AUTH ──
function doLogin() {
  const u = ge('l-user').value.trim(), p = ge('l-pwd').value;
  clearErr();
  if (!u||!p) { showErr('請填寫所有欄位'); return; }
  const k = curRole+':'+u, rec = US[k];
  if (!rec || rec.password !== p) { showErr('登入名稱或密碼錯誤，請重試'); return; }
  curUser = {...rec, username:u, role:curRole};
  renderDash();
}

function doRegister() {
  const code = ge('r-code').value.trim().toUpperCase();
  const u    = ge('r-user').value.trim();
  const p    = ge('r-pwd').value;
  const p2   = ge('r-pwd2').value;
  clearErr();
  if (!code||!u||!p||!p2) { showErr('請填寫所有欄位'); return; }
  if (u.length<4||u.length>20) { showErr('登入名稱須為4–20個字元'); return; }
  if (!/^[a-zA-Z0-9_]+$/.test(u)) { showErr('登入名稱只可包含英文字母、數字及底線'); return; }
  if (p.length<8) { showErr('密碼最少8個字元'); return; }
  if (p!==p2) { showErr('兩次輸入的密碼不符'); return; }

  // Validate code
  if (curRole==='family') {
    const num = parseInt(code.slice(1));
    if (!/^C\d{3}$/.test(code)||num<1||num>115||!FAMILY_DB[code])
      { showErr('找不到此家庭編號（C001–C115），請確認或聯絡秘書處'); return; }
  } else {
    const num = parseInt(code.slice(1));
    if (!/^M\d{3}$/.test(code)||num<1||num>115)
      { showErr('友師編號格式為 M001–M115，請確認或聯絡秘書處'); return; }
  }

  const uk = curRole+':'+u;
  if (US[uk]) { showErr('此登入名稱已被使用，請選擇其他名稱'); return; }
  const ck = 'reg:'+curRole+':'+code;
  if (US[ck]) { showErr('此編號已完成註冊。如有問題，請聯絡秘書處'); return; }

  US[uk] = { password:p, code, role:curRole, regDate:new Date().toLocaleDateString('zh-HK') };
  US[ck] = u;
  saveUS();
  showToast('✅ 帳戶建立成功！請登入');
  switchTab('login');
  ge('l-user').value = u; ge('l-pwd').value = '';
}

function doLogout() {
  curUser = null;
  set('dashboard','none'); showLanding(); showToast('已成功登出');
}

// ── DASHBOARD ──
function renderDash() {
  set('auth-page','none'); set('dashboard','block');
  const isMentor = curUser.role==='mentor', code = curUser.code;

  // topbar
  const chip = ge('user-chip');
  chip.textContent = (isMentor?'🤝 ':'🏠 ') + curUser.username;
  chip.className = 'user-chip ' + (isMentor?'uc-mentor':'uc-family');

  // banner
  ge('banner').className = 'banner ' + (isMentor?'banner-mentor':'banner-family');
  ge('ban-name').textContent = '歡迎回來，' + curUser.username + '！';
  ge('ban-sub').textContent  = '帳戶編號：' + code + '　·　今日：' + new Date().toLocaleDateString('zh-HK');

  isMentor ? renderMentor(code) : renderFamily(code);
  renderProfile();
}

// ── FAMILY VIEW ──
function renderFamily(code) {
  set('fam-section','none');
  const fd = FAMILY_DB[code];
  if (!fd) { ge('act-card').innerHTML='<p class="empty">找不到活動資料，請聯絡秘書處</p>'; return; }
  const sa=fd.studentActivities, pa=fd.parentActivities;
  const sd=sa.filter(a=>a.status==='已完成').length, pd=pa.filter(a=>a.status==='已完成').length;
  const tot=sa.length+pa.length, done=sd+pd;
  const rate=pct(done,tot), sr=pct(sd,sa.length), pr=pct(pd,pa.length);
  ge('s-a').textContent=tot; ge('s-a-l').textContent='總活動項目';
  ge('s-b').textContent=done; ge('s-b-l').textContent='已完成';
  ge('s-c').textContent=rate+'%'; ge('s-c-l').textContent='完成率';
  ge('act-card').innerHTML =
    progRows([['🎒 學生活動',sr],['👨‍👩‍👧 家長活動',pr],['📊 整體',rate]]) +
    '<div class="act-label">🎒 學生活動（'+sd+'/'+sa.length+' 已完成）</div>' + actTable(sa) +
    '<div class="act-label">👨‍👩‍👧 家長活動（'+pd+'/'+pa.length+' 已完成）</div>' + actTable(pa);
}

// ── MENTOR VIEW ──
function renderMentor(code) {
  set('fam-section','block');
  const md = MENTOR_DB[code];

  // Mentor's own activities
  if (md && md.activities && md.activities.length) {
    const acts = md.activities;
    const done = acts.filter(a=>a.status==='已完成').length;
    const rate = pct(done, acts.length);
    ge('s-a').textContent = acts.length; ge('s-a-l').textContent = '友師活動項目';
    ge('s-b').textContent = done;        ge('s-b-l').textContent = '已完成';
    ge('s-c').textContent = rate+'%';    ge('s-c-l').textContent = '完成率';
    ge('act-card').innerHTML =
      progRows([['📊 友師活動完成率', rate]]) +
      '<div class="act-label">🤝 友師活動（'+done+'/'+acts.length+' 已完成）</div>' +
      actTable(acts);
  } else {
    ge('act-card').innerHTML = '<p class="empty">暫無友師活動資料</p>';
    ge('s-a').textContent='—'; ge('s-b').textContent='—'; ge('s-c').textContent='—';
  }

  // Responsible families
  const families = md ? (md.families||[]) : [];
  if (!families.length) { ge('fam-card').innerHTML='<p class="empty">暫未有配對家庭</p>'; return; }
  let html='';
  families.forEach(fc => {
    const fd=FAMILY_DB[fc]; if(!fd) return;
    const all=[...fd.studentActivities,...fd.parentActivities];
    const d=all.filter(a=>a.status==='已完成').length, t=all.length, p=pct(d,t);
    const sd=fd.studentActivities.filter(a=>a.status==='已完成').length;
    const pd=fd.parentActivities.filter(a=>a.status==='已完成').length;
    html+=`<div class="fam-card">
      <div class="fam-head">
        <span class="fam-code">${fc}</span>
        <div class="mini-prog"><div class="mini-wrap"><div class="mini-bar" style="width:${p}%"></div></div>
          <span class="mini-pct">${p}%</span></div>
      </div>
      <div class="fam-detail">學生活動：${sd}/${fd.studentActivities.length} 已完成　·　家長活動：${pd}/${fd.parentActivities.length} 已完成</div>
    </div>`;
  });
  ge('fam-card').innerHTML=html;
}

// ── HELPERS ──
function pct(d,t){ return t>0?Math.round(d/t*100):0; }

function progRows(arr){
  return '<div style="margin-bottom:1.3rem">'+arr.map(([l,v])=>
    `<div class="prog-row"><span class="prog-label">${l}</span>
     <div class="prog-wrap"><div class="prog-bar" style="width:${v}%"></div></div>
     <span class="prog-pct">${v}%</span></div>`).join('')+'</div>';
}

function actTable(acts){
  const rows=acts.map((a,i)=>{
    const done=a.status==='已完成';
    return `<tr><td style="color:var(--muted);font-size:.78rem;width:26px">${i+1}</td>
      <td><strong>${a.name}</strong></td>
      <td><span class="badge ${done?'b-done':'b-not'}">${done?'✅ 已完成':'❌ 未完成'}</span></td></tr>`;
  }).join('');
  return `<div style="overflow-x:auto"><table class="act-table">
    <thead><tr><th>#</th><th>活動名稱</th><th>狀態</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

// ── PROFILE ──
function renderProfile(){
  const isMentor = curUser.role==='mentor';
  ge('profile-grid').innerHTML=`
    <div><div class="pf-key">登入名稱</div><div class="pf-val">${curUser.username}</div></div>
    <div><div class="pf-key">帳戶編號</div><div class="pf-val">${curUser.code}</div></div>
    <div><div class="pf-key">身份</div><div class="pf-val">${isMentor?'友師 Mentor':'家庭單位'}</div></div>
    <div><div class="pf-key">註冊日期</div><div class="pf-val">${curUser.regDate}</div></div>`;
}

// ── PASSWORD ──
function openPwd(){ ['op','np','np2'].forEach(id=>ge(id).value=''); set('pwd-modal','flex'); }
function closePwd(){ set('pwd-modal','none'); }
function doChangePwd(){
  const o=ge('op').value, n=ge('np').value, n2=ge('np2').value;
  if(!o||!n||!n2){showToast('⚠️ 請填寫所有欄位');return;}
  if(o!==curUser.password){showToast('⚠️ 現有密碼錯誤');return;}
  if(n.length<8){showToast('⚠️ 新密碼最少8個字元');return;}
  if(n!==n2){showToast('⚠️ 兩次輸入的新密碼不符');return;}
  US[curUser.role+':'+curUser.username].password=n;
  curUser.password=n; saveUS(); closePwd(); showToast('✅ 密碼已成功更改');
}

// ── TOAST ──
let toastT;
function showToast(m){
  const t=ge('toast'); t.textContent=m; t.style.display='block';
  clearTimeout(toastT); toastT=setTimeout(()=>t.style.display='none',3200);
}

// ── ENTER KEY ──
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  if(ge('auth-page').style.display==='flex')
    ge('tab-login').classList.contains('active') ? doLogin() : doRegister();
});

// ── INIT ──
ge('landing').style.cssText='display:flex;flex-direction:column;';
ge('auth-page').style.display='none';
ge('dashboard').style.display='none';
</script>
</body>
